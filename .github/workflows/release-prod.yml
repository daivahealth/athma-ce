name: Production Deploy (Tags)

on:
  push:
    tags:
      - "v*"
      - "!v*-rc.*"

permissions:
  contents: read
  deployments: write

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build all services
        run: npx turbo run build

      # 🔧 Replace this block with your production deploys
      - name: Deploy to Production
        id: deploy
        run: |
          echo "Deploying to production..."
          # e.g., helm upgrade --install ... --set image.tag=${GITHUB_REF_NAME}
          echo "url=https://app.yourapp.example" >> $GITHUB_OUTPUT
