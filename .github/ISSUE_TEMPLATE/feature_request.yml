name: Feature request
description: Propose an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: What problem does this solve?
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area / Service
      placeholder: foundation / clinical / rcm / analytics
  - type: textarea
    id: scope
    attributes:
      label: Scope
      placeholder: APIs, DB changes, acceptance criteria
  - type: textarea
    id: risks
    attributes:
      label: Risks / Security / Compliance
