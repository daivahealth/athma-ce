# Promtail Configuration for Zeal Healthcare Platform
# Scrapes JSON log files written by Pino and ships them to Loki.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: zeal

scrape_configs:
  # ============================================
  # Zeal Service Logs (Pino JSON files)
  # Services write JSON logs to /var/log/zeal/*.log
  # ============================================
  - job_name: zeal-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: zeal-services
          __path__: /var/log/zeal/*.log
    pipeline_stages:
      # Parse the Pino JSON log line
      - json:
          expressions:
            level: level
            service: service
            time: time
      # Promote level and service to Loki labels for efficient querying
      - labels:
          level:
          service:
      # Use the Pino ISO timestamp
      - timestamp:
          source: time
          format: RFC3339
      # No output stage: store the full JSON line so traceId, spanId,
      # and all structured fields are available in Grafana for
      # Loki ↔ Tempo correlation

  # ============================================
  # Docker Container Logs (staging / production)
  # ============================================
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - labels:
          stream:
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: log
