# Prometheus Configuration for Zeal Healthcare Platform

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: 'zeal-healthcare'
    environment: 'development'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional)
# rule_files:
#   - "rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          service: 'otel-collector'

  # NOTE: Backend services (Foundation, Clinical, RCM) use OTLP push model
  # Metrics are pushed to OTel Collector -> Prometheus via remote write
  # No scrape targets needed for these services

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'

  # Loki
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'

  # Tempo
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
        labels:
          service: 'tempo'

# Remote write configuration (receives data from OTel Collector)
# This is enabled via --web.enable-remote-write-receiver flag
